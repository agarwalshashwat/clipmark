</div>
<div class="space-y-4">

<button class="w-full flex items-center justify-center space-x-3 py-3.5 px-6 rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-colors duration-200 border border-outline-variant/20 active:scale-[0.98]">

<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest text-outline">
<span class="bg-surface-container-lowest px-4">OR</span>
</div>
</div>

<form class="space-y-6">
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1">Email Address</label>
<input class="w-full px-0 py-3 bg-transparent border-b-2 border-surface-container-highest focus:border-primary focus:ring-0 transition-colors placeholder:text-outline/50 font-body outline-none" placeholder="curator@clipmark.com" type="email"/>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1">Password</label>
<a class="text-[10px] font-bold uppercase tracking-widest text-primary hover:opacity-70" href="#">Forgot?</a>
</div>
<input class="w-full px-0 py-3 bg-transparent border-b-2 border-surface-container-highest focus:border-primary focus:ring-0 transition-colors placeholder:text-outline/50 font-body outline-none" placeholder="••••••••" type="password"/>
